<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="css/mobile-optimization.css">
    <link rel="stylesheet" href="css/chat-drawer-drag.css">
    <title>Category - GoShopMe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { 'shine-primary': '#939BFB', 'shine-accent': '#F96226' }, fontFamily: { 'poppins': ['Poppins', 'sans-serif'], 'dm-sans': ['DM Sans', 'sans-serif'] } } } };
    </script>
    <script src="js/wishlist-store.js"></script>
    <style>
        ::-webkit-scrollbar { display: none; }
        .dm-sans { font-family: 'DM Sans', sans-serif; }
        .poppins { font-family: 'Poppins', sans-serif; }
        .bottom-nav-btn { display: flex; flex-direction: column; align-items: center; color: #6B7280; }
        .bottom-nav-btn:hover, .bottom-nav-btn.active { color: #939BFB; }
        .bottom-nav-btn svg { width: 20px; height: 20px; stroke-width: 1.5; margin-bottom: 4px; }
        :root { --shai-nav-h: 72px; }
        #chat-drawer, #chat-input-bar { bottom: 72px !important; }
        #chat-drawer { z-index: 40 !important; }
        #chat-input-bar { z-index: 45 !important; }
        #chat-overlay { z-index: 35 !important; }
        @media screen and (max-width: 768px) {
            #chat-drawer, #chat-input-bar { left: 0 !important; right: 0 !important; max-width: 100vw !important; width: 100% !important; }
        }
    </style>
    <script src="js/header-icons-badges.js"></script>
    <script src="data/product-catalog.js"></script>
    <script src="data/category-products.js"></script>
</head>
<body class="bg-[#F6F6F6] dm-sans text-black">
<div id="app-shell" class="max-w-[390px] mx-auto min-h-screen bg-white">
    <header id="app-header" class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-[390px] bg-white z-50 border-b border-gray-100">
        <div class="relative flex items-center justify-between p-4">
            <a href="ShopbyCategory.html" class="w-10 h-10 flex items-center justify-center text-gray-600 hover:text-gray-800 flex-shrink-0" aria-label="Back"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg></a>
            <h1 id="category-title" class="absolute inset-0 flex items-center justify-center text-lg font-semibold text-gray-900 poppins pointer-events-none">Category</h1>
            <div id="header-icons-slot" class="flex items-center gap-1 flex-shrink-0 min-w-[80px] justify-end">
                <a href="Notifications_Screen.html?from=Category_Products" class="header-icon-btn w-10 h-10 flex items-center justify-center relative text-gray-600 hover:text-gray-800" aria-label="Notifications"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/></svg><div id="notif-indicator" class="absolute -top-0.5 -right-0.5 min-w-[18px] min-h-[18px] px-1 bg-[#F96226] rounded-full hidden items-center justify-center flex"><span id="notif-count" class="text-[10px] text-white font-medium leading-none"></span></div></a>
                <a href="Shopping_bag.html?from=Category_Products" class="header-icon-btn w-10 h-10 flex items-center justify-center relative text-gray-600 hover:text-gray-800" aria-label="Shopping bag"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119.993z"/></svg><div id="cart-indicator" class="absolute -top-0.5 -right-0.5 min-w-[18px] min-h-[18px] px-1 bg-[#939BFB] rounded-full hidden items-center justify-center flex"><span id="cart-count" class="text-[10px] text-white font-medium leading-none"></span></div></a>
            </div>
        </div>
    </header>

    <main class="pt-20 px-4 pb-40">
        <div id="products-grid" class="grid grid-cols-2 gap-4">
            <div class="col-span-2 py-12 text-center text-gray-500 text-sm">Loading...</div>
        </div>
    </main>
</div>

<script>
window.__categoryFallbackProducts = {
    shoes: [
        { id: 'leather-ankle-boots', name: 'Leather Ankle Boots', brand: 'Totême', price: '$640', imageUrls: ['https://raw.githubusercontent.com/nora-todorova/GoShopMe-assets/main/assets/leather%20ankle%20boots.jpg'] },
        { id: 'runway-heels', name: 'Tribute Sandals', brand: 'Saint Laurent', price: '$695', imageUrls: ['https://raw.githubusercontent.com/nora-todorova/GoShopMe-assets/main/assets/Saint%20Laurent%20sandals.jpg'] }
    ],
    dresses: [
        { id: 'silk-midi-dress', name: 'Silk Midi Dress', brand: 'Reformation', price: '$248', imageUrls: ['https://raw.githubusercontent.com/nora-todorova/GoShopMe-assets/main/assets/silk%20midi%20dress.jpg'] },
        { id: 'editorial-dress', name: 'Editorial Midi Dress', brand: 'Bottega Veneta', price: '$2,400', imageUrls: ['https://raw.githubusercontent.com/nora-todorova/GoShopMe-assets/main/assets/bottega%20venetta%20dress.jpg'] }
    ],
    bags: [
        { id: 'designer-tote', name: 'Le 5 À 7 Tote', brand: 'Saint Laurent', price: '$1,490', imageUrls: ['https://raw.githubusercontent.com/nora-todorova/GoShopMe-assets/main/assets/Saint%20Laurent%20bag.jpg'] }
    ],
    workwear: [
        { id: 'structured-blazer', name: 'Le Smoking Blazer', brand: 'Saint Laurent', price: '$1,890', imageUrls: ['https://raw.githubusercontent.com/nora-todorova/GoShopMe-assets/main/assets/Saint%20Laurent%20Blazer.jpg'] },
        { id: 'vintage-blazer', name: 'Vintage Blazer', brand: 'Mugler', price: '$850', imageUrls: ['https://raw.githubusercontent.com/nora-todorova/GoShopMe-assets/main/assets/mugler%20blazer.jpg'] }
    ]
};
document.addEventListener('DOMContentLoaded', async function() {
    const params = new URLSearchParams(window.location.search);
    const categoryId = params.get('category') || '';
    const titleEl = document.getElementById('category-title');
    const gridEl = document.getElementById('products-grid');

    const categoryNames = { shoes: 'Shoes', dresses: 'Dresses', bags: 'Bags', workwear: 'Workwear', swimwear: 'Swimwear', beauty: 'Beauty', wellness: 'Wellness', sale: 'Sale' };
    const categoryName = categoryNames[categoryId] || (categoryId.charAt(0).toUpperCase() + categoryId.slice(1));
    if (titleEl) titleEl.textContent = categoryName;
    document.title = categoryName + ' - GoShopMe';

    let products = [];
    const CATALOG_URL = 'https://raw.githubusercontent.com/nora-todorova/GoShopMe-assets/main/product-catalog.json';
    const LOCAL_CATALOG = 'data/product-catalog.json';
    const MAPPING_URL = 'data/category-products.json';

    var catalog = (window.__fullProductCatalog && window.__fullProductCatalog.products) ? { products: window.__fullProductCatalog.products } : null;

    function toCatalogProduct(p) {
        var img = (p.imageUrls && p.imageUrls[0]) || p.image || (p.images && p.images[0]) || '';
        return { id: p.id, name: p.name, brand: p.brand, price: p.price, imageUrls: (p.imageUrls && p.imageUrls.length) ? p.imageUrls : (img ? [img] : []), images: p.images };
    }

    function fallbackFromFeeds() {
        var keywordMap = {
            shoes: ['boot', 'sandals', 'heels', 'pumps', 'shoes', 'ankle', 'sneaker', 'loafer', 'flat'],
            dresses: ['dress', 'midi', 'gown'],
            bags: ['bag', 'tote', 'clutch', 'crossbody', 'shoulder bag'],
            workwear: ['blazer', 'suit', 'trousers', 'pencil skirt', 'shirt', 'blouse', 'tailored'],
            swimwear: ['swim', 'bikini', 'maillot', 'cover-up'],
            beauty: ['lipstick', 'cream', 'fragrance', 'serum', 'beauty'],
            wellness: ['wellness', 'vitamin', 'supplement', 'oil'],
            sale: []
        };
        var keywords = keywordMap[categoryId];
        if (!keywords || !keywords.length) keywords = [];
        return Promise.all([fetch('data/home.json').then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; }), fetch('data/trending.json').then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; })])
            .then(function(results) {
                var home = results[0], trending = results[1];
                var list = [];
                if (home && home.justForYou) list = list.concat(home.justForYou);
                if (home && home.trending) list = list.concat(home.trending);
                if (trending && trending.justForYou && trending.justForYou.products) list = list.concat(trending.justForYou.products);
                if (trending && trending.featuredBrand && trending.featuredBrand.products) list = list.concat(trending.featuredBrand.products);
                if (trending && trending.celebrityPicks) trending.celebrityPicks.forEach(function(c) { if (c.products) list = list.concat(c.products); });
                if (trending && trending.creatorSpotlight) trending.creatorSpotlight.forEach(function(c) { if (c.products) list = list.concat(c.products); });
                var normalized = list.map(toCatalogProduct).filter(function(p) { return p.id; });
                if (keywords.length === 0) return normalized;
                var lower = (categoryId || '').toLowerCase();
                return normalized.filter(function(p) {
                    var text = ((p.name || '') + ' ' + (p.brand || '')).toLowerCase();
                    return keywords.some(function(k) { return text.indexOf(k) >= 0; });
                });
            })
            .catch(function() { return []; });
    }

    try {
        var mapping = (typeof window.__categoryMapping === 'object' && window.__categoryMapping) ? window.__categoryMapping : null;
        try { var mapRes = await fetch(MAPPING_URL); if (mapRes.ok) mapping = await mapRes.json(); } catch (e0) {}
        if (!mapping) mapping = (typeof window.__categoryMapping === 'object' && window.__categoryMapping) ? window.__categoryMapping : null;

        if (!catalog || !catalog.products) {
            try { var catRes = await fetch(CATALOG_URL); if (catRes.ok) catalog = await catRes.json(); } catch (e1) {}
            if (!catalog || !catalog.products) {
                try { var localRes = await fetch(LOCAL_CATALOG); if (localRes.ok) catalog = await localRes.json(); } catch (e2) {}
            }
        }
        if (catalog && catalog.products) {
            if (categoryId === 'sale') {
                // Sale: show only products in the sale mapping (only actually discounted items: 63, 64, 65, 66, 67)
                var saleIdSet = (mapping && mapping.sale && Array.isArray(mapping.sale)) ? new Set(mapping.sale.map(String)) : new Set();
                products = catalog.products.filter(function(p) { return p.id && saleIdSet.has(String(p.id)); });
            } else if (mapping && mapping[categoryId]) {
                var ids = mapping[categoryId];
                if (Array.isArray(ids)) {
                    var idSet = new Set(ids.map(String));
                    products = catalog.products.filter(function(p) { return p.id && idSet.has(String(p.id)); });
                }
            }
        }
        if (products.length === 0) products = await fallbackFromFeeds();
        if (products.length === 0 && window.__categoryFallbackProducts && window.__categoryFallbackProducts[categoryId])
            products = window.__categoryFallbackProducts[categoryId];
    } catch (e) {
        console.warn('Category products load failed', e);
        try { products = await fallbackFromFeeds(); } catch (e2) {}
        if (products.length === 0 && window.__categoryFallbackProducts && window.__categoryFallbackProducts[categoryId])
            products = window.__categoryFallbackProducts[categoryId];
    }

    function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function formatPrice(v) { if (!v) return ''; var s = typeof v === 'string' ? v.trim() : String(v); if (/^[€$£]\s*[\d.,]+/.test(s)) return s; if (s.indexOf('€') >= 0) return '€ ' + s.replace(/\s*€\s*$/g, '').replace(/€/g, '').trim(); return s; }
    var SALE_ORIGINAL = { '63': '€ 210', '64': '€ 190', '65': '€ 270', '66': '€ 120', '67': '€ 95' };
    function discountPct(orig, sale) {
        if (!orig || !sale) return null;
        var o = parseFloat(String(orig).replace(/[€$£\s]/g, '').replace(',', '.'));
        var s = parseFloat(String(sale).replace(/[€$£\s]/g, '').replace(',', '.'));
        if (isNaN(o) || isNaN(s) || o <= 0 || s >= o) return null;
        return Math.round((1 - s / o) * 100);
    }
    function wishlistBtnHtml(p) {
        var inWishlist = (typeof window.GoShopMeWishlist !== 'undefined' && window.GoShopMeWishlist.isInWishlist(p.id));
        var heartFill = inWishlist ? '#939BFB' : 'none';
        var heartClass = inWishlist ? ' heart-filled' : '';
        return '<button type="button" class="p-1 wishlist-btn" onclick="event.preventDefault();event.stopPropagation();" data-product-id="'+esc(p.id)+'" data-product-name="'+esc(p.name||'')+'" data-product-brand="'+esc(p.brand)+'" data-product-price="'+esc(priceForBtn(p))+'" data-product-image="'+esc((p.imageUrls&&p.imageUrls[0])||(p.images&&p.images[0])||'')+'" aria-label="Wishlist"><svg class="w-4 h-4 text-white'+heartClass+'" fill="'+esc(heartFill)+'" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/></svg></button>';
    }
    function priceForBtn(p) {
        var raw = (typeof p.price === 'string') ? p.price : (p.price != null ? (p.price + '') : '');
        if (!raw && SALE_ORIGINAL[String(p.id)]) raw = { '66': '€ 96', '67': '€ 76' }[String(p.id)] || '';
        return formatPrice(raw);
    }
    var shareBtnHtml = '<button type="button" class="p-1 share-product-btn" onclick="event.preventDefault();event.stopPropagation();"><svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg></button>';
    var productTilePlaceholder = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect fill=%22%23f3f4f6%22 width=%22400%22 height=%22400%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22 fill=%22%239ca3af%22 font-size=%2214%22 font-family=%22sans-serif%22%3ENo image%3C/text%3E%3C/svg%3E';
    window.__productTilePlaceholder = productTilePlaceholder;
    function cardHtml(p) {
        var img = (p.imageUrls && p.imageUrls[0]) || (p.images && p.images[0]) || '';
        if (!img) img = productTilePlaceholder;
        var rawPrice = (typeof p.price === 'string') ? p.price : (p.price != null ? (p.price + '') : '');
        if (!rawPrice && SALE_ORIGINAL[String(p.id)]) rawPrice = { '66': '€ 96', '67': '€ 76' }[String(p.id)] || rawPrice;
        var price = formatPrice(rawPrice);
        var orig = p.originalPrice || p.original_price || SALE_ORIGINAL[String(p.id)];
        var origFormatted = orig ? formatPrice(orig) : '';
        var isSale = origFormatted && price;
        var pct = isSale ? (p.discountPercent != null ? p.discountPercent : discountPct(origFormatted, price)) : null;
        var q = 'id=' + esc(p.id) + '&name=' + encodeURIComponent(p.name||'') + '&brand=' + encodeURIComponent(p.brand||'') + '&from=category';
        if (img) q += '&image=' + encodeURIComponent(img);
        if (price) q += '&price=' + encodeURIComponent(price);
        if (origFormatted) q += '&originalPrice=' + encodeURIComponent(origFormatted);
        var priceBlock = isSale
            ? '<div class="flex flex-wrap items-baseline gap-x-1.5"><span class="product-tile-price-original">'+esc(origFormatted)+'</span><span class="product-tile-price product-tile-price-sale">'+esc(price)+'</span>' + (pct != null ? '<span class="product-tile-discount">−'+pct+'%</span>' : '') + '</div>'
            : '<p class="product-tile-price">'+esc(price)+'</p>';
        var imgTag = '<img class="w-full aspect-square object-cover" src="'+esc(img)+'" alt="'+esc(p.name)+'" onerror="this.onerror=null;this.src=(window.__productTilePlaceholder||\'\')">';
        return '<a href="Product_details_page.html?' + q + '" class="block bg-white rounded-xl overflow-hidden"><div class="relative">'+imgTag+'<div class="absolute top-2 right-2 flex flex-col space-y-1">'+wishlistBtnHtml(p)+shareBtnHtml+'</div></div><div class="p-2.5"><p class="product-tile-brand">'+esc(p.brand)+'</p><h4 class="product-tile-name">'+esc(p.name||'')+'</h4>'+priceBlock+'</div></a>';
    }

    if (products.length === 0 && window.__categoryFallbackProducts && window.__categoryFallbackProducts[categoryId])
        products = window.__categoryFallbackProducts[categoryId];
    if (products.length) {
        gridEl.innerHTML = products.map(cardHtml).join('');
    } else {
        gridEl.innerHTML = '<div class="col-span-2 py-12 text-center text-gray-500 text-sm">No products in this category.</div>';
    }
    document.addEventListener('click', function(e) {
        var btn = e.target.closest('.wishlist-btn');
        if (!btn) return;
        e.preventDefault();
        e.stopPropagation();
        var id = btn.getAttribute('data-product-id');
        if (!id) return;
        var W = window.GoShopMeWishlist;
        if (!W) return;
        var svg = btn.querySelector('svg');
        if (W.isInWishlist(id)) {
            W.removeFromWishlist(id);
            if (svg) { svg.classList.remove('heart-filled'); svg.setAttribute('fill', 'none'); }
        } else {
            var product = { id: id, name: btn.getAttribute('data-product-name') || '', brand: btn.getAttribute('data-product-brand') || '', price: btn.getAttribute('data-product-price') || '', image: btn.getAttribute('data-product-image') || '' };
            W.addToWishlist(product);
            if (svg) { svg.classList.add('heart-filled'); svg.setAttribute('fill', '#939BFB'); }
        }
    });
});
</script>

<!-- Chat overlay, drawer, input bar (tap bar to open drawer) -->
<div id="chat-overlay" class="fixed inset-0 bg-black/40 z-40 hidden"></div>
<div id="chat-drawer" class="fixed bottom-16 left-1/2 -translate-x-1/2 w-full max-w-[390px] bg-white rounded-t-3xl shadow-2xl z-40 h-[50vh] transform translate-y-full transition-transform duration-300 flex flex-col border-t border-gray-100" style="max-height:calc(100dvh - 144px)">
    <div id="drag-handle-zone" class="chat-drawer-drag-zone flex justify-center flex-shrink-0" style="touch-action:none;user-select:none;padding-top:14px;padding-bottom:14px;cursor:grab">
        <div class="w-10 h-1 bg-gray-300 rounded-full pointer-events-none"></div>
    </div>
    <div class="flex items-center px-4 pb-2 flex-shrink-0">
        <button id="shai-friend-back" class="hidden w-8 h-8 flex items-center justify-center mr-2 hover:opacity-70 transition-opacity" aria-label="Back to chat">
            <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
        </button>
        <div id="shai-avatar-wrap" class="w-8 h-8 rounded-full overflow-hidden mr-3 flex-shrink-0">
            <img class="w-full h-full object-cover" src="https://raw.githubusercontent.com/nora-todorova/GoShopMe-assets/main/assets/shai-avatar.png" alt="ShAI" data-shai-avatar>
        </div>
        <div class="flex-1">
            <p id="shai-header-title" class="font-semibold text-black text-sm">ShAI</p>
            <p id="shai-header-sub" class="text-xs text-gray-500">Your shopping assistant</p>
        </div>
    </div>
    <div id="shai-messages" class="flex-1 overflow-y-auto min-h-0" style="overscroll-behavior:contain">
        <div class="p-4 pb-0">
            <div class="flex items-start space-x-3 mb-4">
                <div class="w-10 h-10 rounded-full overflow-hidden flex-shrink-0">
                    <img class="w-full h-full object-cover" src="https://raw.githubusercontent.com/nora-todorova/GoShopMe-assets/main/assets/shai-avatar.png" alt="ShAI" data-shai-avatar>
                </div>
                <div class="flex-1">
                    <div class="bg-gray-50 rounded-2xl rounded-tl-md p-3 mb-3">
                        <p class="text-sm text-black">Hi there! I am ShAI, your personal shopping assistant. How can I help you today?</p>
                    </div>
                    <div class="flex flex-wrap gap-2 pb-2">
                        <button class="shai-prompt bg-white border border-[#B7C7FF] text-[#939BFB] px-3 py-1.5 rounded-full text-xs font-medium hover:bg-[#939BFB] hover:text-white transition-colors">Find pieces from my photo</button>
                        <button class="shai-prompt bg-white border border-[#B7C7FF] text-[#939BFB] px-3 py-1.5 rounded-full text-xs font-medium hover:bg-[#939BFB] hover:text-white transition-colors">Ask a friend for opinion</button>
                        <button class="shai-prompt bg-white border border-[#B7C7FF] text-[#939BFB] px-3 py-1.5 rounded-full text-xs font-medium hover:bg-[#939BFB] hover:text-white transition-colors">Find budget-friendly options</button>
                        <button class="shai-prompt bg-white border border-[#B7C7FF] text-[#939BFB] px-3 py-1.5 rounded-full text-xs font-medium hover:bg-[#939BFB] hover:text-white transition-colors">Find the exact bag</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="shai-friend-panel" class="hidden flex-col flex-1 min-h-0 overflow-hidden">
        <div class="px-4 py-2 border-b border-gray-100 flex-shrink-0">
            <div class="relative">
                <svg class="absolute left-3 top-2.5 w-4 h-4 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input type="text" id="shai-friend-search" placeholder="Search contacts..." class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2 pl-10 text-sm">

})();
